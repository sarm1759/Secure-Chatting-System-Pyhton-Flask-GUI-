<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureChat | Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        #loginSection { display: block; } /* Yeh line add karein */
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; font-weight: 700; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; }
        .primary-btn { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .primary-btn:hover { background: #5a6fd6; transform: translateY(-2px); }
        .footer-links { margin-top: 20px; font-size: 14px; color: #666; }
        .link { color: #667eea; cursor: pointer; text-decoration: none; font-weight: 600; }
        #forgotSection { display: none; }
    </style>
</head>
<body>

    <div class="glass-card animate__animated animate__fadeInDown">
        <div id="loginSection">
            <h2>SecureChat</h2>
            <form id="loginForm">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>
            <div class="footer-links">
                <p>Don't have an account? <a href="/signup" class="link">Sign Up</a></p>
                <p style="margin-top: 10px;"><span class="link" onclick="toggleForgot()">Forgot Password?</span></p>
            </div>
        </div>

        <div id="forgotSection">
            <h2>Reset Password</h2>
            <input type="text" id="resetUser" placeholder="Enter Username">
            <input type="text" id="ans1" placeholder="Nickname?">
            <input type="text" id="ans2" placeholder="Best Friend?">
            <input type="password" id="newPass" placeholder="New Password">
            <button class="primary-btn" onclick="handleReset()">Update Password</button>
            <p class="footer-links"><span class="link" onclick="toggleForgot()">Back to Login</span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        function showToast(msg, color) {
            Toastify({ text: msg, duration: 3000, gravity: "top", position: "center", style: { background: color } }).showToast();
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch('/login', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.status === 'success') {
                showToast(data.message, "#28a745");
                // 🚨 FIX: Using data.redirect from server instead of hardcoded '/dashboard'
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1000);
            } else {
                showToast(data.message, "#dc3545");
            }
        };

        async function handleReset() {
            const payload = {
                username: document.getElementById('resetUser').value,
                ans1: document.getElementById('ans1').value,
                ans2: document.getElementById('ans2').value,
                new_password: document.getElementById('newPass').value
            };
            const res = await fetch('/reset_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.status === 'success') {
                showToast(data.message, "#28a745");
                toggleForgot();
            } else {
                showToast(data.message, "#dc3545");
            }
        }

        function toggleForgot() {
    const login = document.getElementById('loginSection');
    const forgot = document.getElementById('forgotSection');

    if (login.style.display === "none") {
        login.style.display = "block";
        forgot.style.display = "none";
    } else {
        login.style.display = "none";
        forgot.style.display = "block";
    }
}


    </script>
</body>
</html>
